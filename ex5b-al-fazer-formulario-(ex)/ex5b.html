<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário Bootstrap Customizado</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap ícones -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body class="bg-primary bg-gradient d-flex justify-content-center align-items-center vh-100">

<div class="container">
<form class="bg-white p-4 rounded-4 shadow">

<div class="col-sm-6 mb-3">
<label for="email" class="form-label">Email</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>
<input type="email" class="form-control" id="email" placeholder="Digite seu email">
</div>
</div>

<div class="col-sm-6 mb-3">
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-person"></i>
</span>
<input type="text" class="form-control" placeholder="UserName">
</div>
</div>

<div class="col-sm-6 mb-3">
<label for="senha" class="form-label">Senha</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>
<input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
</div>
</div>

<button type="submit" class="btn btn-danger w-100">
Entrar <i class="bi bi-arrow-right"></i>
</button>

</form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
